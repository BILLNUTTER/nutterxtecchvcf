openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nutterx Technologies VCF Registration API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: registration
    description: Public registration operations
  - name: admin
    description: Admin-only operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /register:
    post:
      operationId: registerPhone
      tags: [registration]
      summary: Register a phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Phone already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /download-vcf:
    get:
      operationId: downloadVcf
      tags: [registration]
      summary: Download the NUTTERX.vcf contact card
      responses:
        "200":
          description: VCF file
          content:
            text/vcard:
              schema:
                type: string
        "403":
          description: Download locked until the community target is reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /progress:
    get:
      operationId: getCommunityProgress
      tags: [registration]
      summary: Public registration progress toward the VCF unlock target
      responses:
        "200":
          description: Progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityProgress"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "204":
          description: Logged out

  /admin/session:
    get:
      operationId: getAdminSession
      tags: [admin]
      summary: Get current admin session status
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"

  /admin/registrations:
    get:
      operationId: listRegistrations
      tags: [admin]
      summary: List registrations with optional search
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Matches against name or phone
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: List of registrations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationsListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/registrations/{id}:
    delete:
      operationId: deleteRegistration
      tags: [admin]
      summary: Delete a registration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/registrations/export:
    get:
      operationId: exportRegistrationsCsv
      tags: [admin]
      summary: Export all registrations as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getStats
      tags: [admin]
      summary: Registration statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings:
    get:
      operationId: getVcfSettings
      tags: [admin]
      summary: Get VCF / company settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VcfSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateVcfSettings
      tags: [admin]
      summary: Update VCF / company settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VcfSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VcfSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Registration:
      type: object
      required: [id, name, phone, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time

    RegistrationInput:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          description: Must be in strict E.164 format, e.g. +254712345678

    RegistrationsListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Registration"
        total:
          type: integer

    AdminLoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminSession:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        username:
          type: ["string", "null"]

    Stats:
      type: object
      required:
        [totalRegistrations, todayRegistrations, weekRegistrations]
      properties:
        totalRegistrations:
          type: integer
        todayRegistrations:
          type: integer
        weekRegistrations:
          type: integer

    VcfSettings:
      type: object
      required:
        [
          companyName,
          contactName,
          phone,
          email,
          website,
          address,
          whatsapp,
          logoDataUrl,
          registrationTarget,
        ]
      properties:
        companyName:
          type: string
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string
        address:
          type: string
        whatsapp:
          type: string
        logoDataUrl:
          type: ["string", "null"]
          description: Base64 data URI of the company logo, or null if unset
        registrationTarget:
          type: integer
          minimum: 1
          description: Number of registrations required to unlock the VCF download for everyone

    VcfSettingsUpdate:
      type: object
      properties:
        companyName:
          type: string
        contactName:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string
        address:
          type: string
        whatsapp:
          type: string
        logoDataUrl:
          type: ["string", "null"]
        registrationTarget:
          type: integer
          minimum: 1

    CommunityProgress:
      type: object
      required: [total, target, unlocked]
      properties:
        total:
          type: integer
          description: Total number of registrations so far
        target:
          type: integer
          description: Number of registrations required to unlock the VCF download
        unlocked:
          type: boolean
          description: Whether the target has been reached and the VCF is downloadable
